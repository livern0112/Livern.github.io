<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法研社 AI 助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --paper-dark: #ede6d6;
    --accent: #8b2020;
    --accent-light: #c0392b22;
    --gold: #c9a84c;
    --border: #d4c9b0;
    --muted: #7a6e5f;
    --bubble-ai: #ffffff;
    --bubble-user: #8b2020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 背景紋理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,120,0.08) 28px, rgba(180,160,120,0.08) 29px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    border-bottom: 2px solid var(--accent);
    background: var(--paper-dark);
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(139,32,32,0.08);
  }

  .header-seal {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    flex-shrink: 0;
    box-shadow: 2px 2px 0 var(--gold);
  }

  .header-text h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .header-text p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot::before {
    content: '';
    width: 7px;
    height: 7px;
    background: #4caf50;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-track { background: transparent; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Serif TC', serif;
    margin-top: 2px;
  }

  .avatar.ai {
    background: var(--accent);
    color: white;
    box-shadow: 1px 1px 0 var(--gold);
  }

  .avatar.user-av {
    background: var(--ink);
    color: var(--paper);
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 2px;
    font-size: 14px;
    line-height: 1.75;
    position: relative;
  }

  .message.ai .bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    color: var(--ink);
    box-shadow: 2px 2px 0 var(--paper-dark);
  }

  .message.user .bubble {
    background: var(--bubble-user);
    color: white;
    box-shadow: -2px 2px 0 rgba(139,32,32,0.3);
  }

  .bubble-label {
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 5px;
    font-weight: 500;
  }

  .message.ai .bubble-label { color: var(--accent); }
  .message.user .bubble-label { color: rgba(255,255,255,0.7); }

  /* 分隔線 */
  .divider {
    text-align: center;
    margin: 8px 0 20px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    position: relative;
  }

  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }

  .divider::before { left: 0; }
  .divider::after { right: 0; }

  /* 輸入區域 */
  #input-area {
    position: relative;
    z-index: 10;
    padding: 16px;
    border-top: 1px solid var(--border);
    background: var(--paper-dark);
  }

  .quick-hints {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .hint-btn {
    padding: 5px 12px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .hint-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    padding: 11px 14px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--ink);
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--border); }

  #send-btn {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    box-shadow: 2px 2px 0 rgba(139,32,32,0.3);
  }

  #send-btn:hover { background: #6e1a1a; transform: translate(-1px, -1px); box-shadow: 3px 3px 0 rgba(139,32,32,0.3); }
  #send-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 rgba(139,32,32,0.3); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; box-shadow: none; }

  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* 打字動畫 */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--border);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <div class="header-seal">法</div>
  <div class="header-text">
    <h1>北大法研社 AI 助手</h1>
    <p>NKUPU Law Research Society · AI Assistant</p>
  </div>
  <div class="status-dot">運作中</div>
</header>

<div id="chat-container">
  <div class="divider">對話開始</div>
  <div class="message ai" id="welcome-msg">
    <div class="avatar ai">助</div>
    <div class="bubble">
      <div class="bubble-label">法研社 AI 助手</div>
      你好！我是北大法研社的 AI 助手 🏛️<br><br>
      我可以幫你：<br>
      • 學習 <strong>Notion 操作</strong>（頁面、資料庫、權限設定）<br>
      • 了解社團的<strong>架構與制度</strong><br>
      • 回答<strong>社團相關問題</strong><br><br>
      有什麼想問的嗎？
    </div>
  </div>
</div>

<div id="input-area">
  <div class="quick-hints">
    <button class="hint-btn" onclick="sendHint('怎麼設定頁面權限？')">怎麼設定頁面權限？</button>
    <button class="hint-btn" onclick="sendHint('社團幹部有哪些？')">社團幹部有哪些？</button>
    <button class="hint-btn" onclick="sendHint('如何建立小組協作空間？')">如何建立小組協作空間？</button>
    <button class="hint-btn" onclick="sendHint('Notion 資料庫怎麼用？')">Notion 資料庫怎麼用？</button>
  </div>
  <div class="input-row">
    <textarea id="user-input" placeholder="輸入問題，按 Enter 送出..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-note">由 Claude AI 驅動 · 北大法研社資訊組維護</div>
</div>

<script>
const SYSTEM_PROMPT = `你是北大法研社（北臺大法律研究社）的專屬 AI 助手，名字叫「法助」。

【社團基本資料】
- 社團名稱：北大法研社（北臺大法律研究社）
- 使命：共同精進，普及法律，結識人脈關係，提升法學水平
- 聯絡：IG 北大法研社 / Email: b0907550819@gmail.com

【幹部名單】
- 社長：洪子傑
- 副社長：承叡
- 教學長：陳豊文（也是資訊維護聯絡人）
- 總務長：陳柏旭
- 顧問：林立弘
- 資訊長：簡輝恩

【工作空間架構（Notion）】
- 使用 Notion Plus 方案（學生社團教育優惠）
- 總部頁面下有各幹部辦公室、Resources 資料庫區、ROBOT 機器人區
- 成員可建立私人頁面或小組協作空間

【你的任務】
1. 回答 Notion 操作問題（繁體中文，清晰步驟說明）
2. 介紹社團制度與架構
3. 協助成員了解如何使用社團工作空間
4. 提供 Notion 學習建議

【回答風格】
- 使用繁體中文
- 友善、簡潔、實用
- 步驟說明用數字列表
- 如果不確定的事情，誠實說明並建議聯繫相關幹部`;

let conversationHistory = [];
let isLoading = false;

const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

function sendHint(text) {
  userInput.value = text;
  sendMessage();
}

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `message ${role === 'assistant' ? 'ai' : 'user'}`;

  if (role === 'assistant') {
    msg.innerHTML = `
      <div class="avatar ai">助</div>
      <div class="bubble">
        <div class="bubble-label">法研社 AI 助手</div>
        ${content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}
      </div>`;
  } else {
    msg.innerHTML = `
      <div class="avatar user-av">我</div>
      <div class="bubble">
        <div class="bubble-label">你</div>
        ${content.replace(/\n/g, '<br>')}
      </div>`;
  }

  chatContainer.appendChild(msg);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return msg;
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'message ai';
  msg.id = 'typing';
  msg.innerHTML = `
    <div class="avatar ai">助</div>
    <div class="bubble">
      <div class="bubble-label">法研社 AI 助手</div>
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>`;
  chatContainer.appendChild(msg);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isLoading) return;

  userInput.value = '';
  userInput.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || '抱歉，發生了錯誤，請稍後再試。';

    document.getElementById('typing')?.remove();
    addMessage('assistant', reply);
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    document.getElementById('typing')?.remove();
    addMessage('assistant', '⚠️ 連線發生問題，請稍後再試。如需協助請聯絡資訊長簡輝恩。');
  }

  isLoading = false;
  sendBtn.disabled = false;
  userInput.focus();
}
</script>
</body>
</html>
